name: Smoke
on:
  workflow_dispatch:
  schedule:
    # Nightly at 06:00 UTC
    - cron: '0 6 * * *'
jobs:
  smoke-suite:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Pester 5
        shell: powershell
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force `
            -SkipPublisherCheck -Scope CurrentUser
      - name: Generate fixtures
        run: python tests/fixtures/build_fixtures.py
      - name: Run full smoke suite
        shell: powershell
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File tests\Run-Smoke.ps1
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: test-results/
          retention-days: 14
